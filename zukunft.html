<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROJECT L33T – Die Zukunft</title>

  <style>
    :root {
      --white: #f7fbff;
      --blue: #5fd7ff;
      --red: #ff1f2d;
      --dark: #01030a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      color: var(--white);
    }

    .space {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 60%, rgba(18, 43, 77, 0.24), transparent 34%),
        radial-gradient(circle at 18% 25%, rgba(67, 34, 113, 0.16), transparent 30%),
        linear-gradient(180deg, #000 0%, #020611 52%, #000 100%);
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: -50%;
      content: "";
      background-repeat: repeat;
      pointer-events: none;
    }

    .stars {
      opacity: 0.8;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(120,210,255,.8) 0 1px, transparent 1.6px);
      background-size: 95px 95px, 145px 145px;
      background-position: 0 0, 45px 70px;
      animation: driftOne 90s linear infinite;
    }

    .stars::before {
      opacity: 0.55;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.8) 0 1.3px, transparent 1.9px);
      background-size: 190px 190px;
      background-position: 60px 25px;
      animation: driftTwo 120s linear infinite;
    }

    .stars::after {
      opacity: 0.28;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 2.6px);
      background-size: 320px 320px;
      background-position: 130px 80px;
      filter: blur(.2px);
      animation: driftThree 150s linear infinite;
    }

    .nebula {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse at center, rgba(42, 132, 196, 0.12), transparent 34%),
        radial-gradient(ellipse at 68% 42%, rgba(103, 43, 158, 0.10), transparent 25%);
      filter: blur(30px);
      animation: nebulaPulse 9s ease-in-out infinite alternate;
    }

    .horizon {
      position: absolute;
      left: 50%;
      bottom: -33vh;
      width: 125vw;
      height: 58vh;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 0%, rgba(47, 145, 209, .35), transparent 18%),
        linear-gradient(180deg, #061423 0%, #000 62%);
      box-shadow:
        0 -4px 35px rgba(73, 192, 255, .3),
        0 -20px 100px rgba(37, 115, 170, .14);
      opacity: .8;
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 4vw;
      text-align: center;
    }

    .panel {
      width: min(1500px, 96vw);
      min-height: 72vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .eyebrow {
      margin-bottom: 2rem;
      color: rgba(168, 224, 255, .75);
      font-size: clamp(.8rem, 1.2vw, 1.15rem);
      letter-spacing: .42em;
      text-transform: uppercase;
      transition: opacity .6s ease;
    }

    .message {
      width: 100%;
      min-height: 46vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .line {
      position: absolute;
      width: 100%;
      padding: 0 2vw;
      opacity: 0;
      transform: translateY(22px) scale(.96);
      transition:
        opacity .75s ease,
        transform .75s cubic-bezier(.2,.8,.2,1),
        filter .75s ease;
      filter: blur(7px);
      font-weight: 700;
      font-size: clamp(2.8rem, 6.8vw, 7.4rem);
      line-height: 1.05;
      letter-spacing: .02em;
      text-shadow:
        0 0 14px rgba(255,255,255,.22),
        0 0 38px rgba(63,191,255,.12);
    }

    .line.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .line.fade {
      opacity: 0;
      transform: translateY(-24px) scale(1.025);
      filter: blur(7px);
    }

    .line.you {
      color: var(--red);
      font-size: clamp(8rem, 29vw, 33rem);
      font-weight: 1000;
      line-height: .72;
      letter-spacing: -.055em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255,255,255,.8),
        0 0 26px rgba(255,31,45,.95),
        0 0 70px rgba(255,0,20,.75),
        0 0 150px rgba(255,0,20,.45);
      transform: scale(.45);
    }

    .line.you.active {
      animation: youImpact 1.05s cubic-bezier(.1,.9,.15,1.15) both;
    }

    .controls {
      position: absolute;
      bottom: 2.5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      transition: opacity .5s ease, transform .5s ease;
    }

    .controls.hidden {
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
    }

    button {
      position: relative;
      min-width: min(430px, 82vw);
      padding: 1.15rem 2rem;
      border: 1px solid rgba(95, 215, 255, .65);
      border-radius: 4px;
      background:
        linear-gradient(180deg, rgba(7, 25, 42, .88), rgba(2, 8, 15, .94));
      color: #dff7ff;
      font-size: clamp(1rem, 1.45vw, 1.25rem);
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      box-shadow:
        inset 0 0 20px rgba(95,215,255,.06),
        0 0 22px rgba(28,155,220,.14);
      transition: .25s ease;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-110%);
      background: linear-gradient(90deg, transparent, rgba(132,229,255,.24), transparent);
      transition: transform .65s ease;
    }

    button:hover {
      border-color: rgba(137, 230, 255, .95);
      color: #fff;
      box-shadow:
        inset 0 0 26px rgba(95,215,255,.12),
        0 0 36px rgba(28,155,220,.3);
      transform: translateY(-2px);
    }

    button:hover::before {
      transform: translateX(110%);
    }

    .hint {
      color: rgba(196, 230, 245, .48);
      font-size: .72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: white;
      opacity: 0;
    }

    .flash.active {
      animation: flash .6s ease-out;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: .08;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(255,255,255,.22) 4px
      );
      mix-blend-mode: screen;
    }

    @keyframes driftOne {
      from { transform: translate3d(0, 0, 0) rotate(0deg); }
      to { transform: translate3d(-9%, 13%, 0) rotate(.5deg); }
    }

    @keyframes driftTwo {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(8%, -11%, 0) scale(1.04); }
    }

    @keyframes driftThree {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-5%, -7%, 0); }
    }

    @keyframes nebulaPulse {
      from { opacity: .55; transform: scale(1); }
      to { opacity: .9; transform: scale(1.08); }
    }

    @keyframes youImpact {
      0% {
        opacity: 0;
        transform: scale(.25);
        filter: blur(18px);
      }
      45% {
        opacity: 1;
        transform: scale(1.13);
        filter: blur(0);
      }
      68% {
        transform: scale(.96);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes flash {
      0% { opacity: 0; }
      18% { opacity: .92; }
      100% { opacity: 0; }
    }


    body.impact .space {
      animation: screenShake .22s linear 1;
    }

    body.impact .nebula {
      opacity: .28;
      filter: blur(42px) brightness(.55);
    }

    body.impact .horizon {
      opacity: .35;
      box-shadow:
        0 -4px 55px rgba(255, 31, 45, .22),
        0 -25px 120px rgba(255, 0, 20, .12);
    }

    body.impact .eyebrow {
      opacity: 0 !important;
    }

    body.impact .line.you {
      animation:
        youImpact 1.05s cubic-bezier(.1,.9,.15,1.15) both,
        redPulse 1.8s ease-in-out .55s 2;
    }

    @keyframes screenShake {
      0%   { transform: translate(0, 0); }
      20%  { transform: translate(-7px, 3px); }
      40%  { transform: translate(6px, -3px); }
      60%  { transform: translate(-4px, 2px); }
      80%  { transform: translate(3px, -1px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes redPulse {
      0%, 100% {
        text-shadow:
          0 0 8px rgba(255,255,255,.8),
          0 0 26px rgba(255,31,45,.95),
          0 0 70px rgba(255,0,20,.75),
          0 0 150px rgba(255,0,20,.45);
      }
      50% {
        text-shadow:
          0 0 14px rgba(255,255,255,1),
          0 0 45px rgba(255,31,45,1),
          0 0 110px rgba(255,0,20,.95),
          0 0 220px rgba(255,0,20,.7);
      }
    }



    body.video-focus .stars,
    body.video-focus .nebula,
    body.video-focus .horizon,
    body.video-focus .content,
    body.video-focus .scanlines {
      transform: scale(1.035);
      filter: blur(4px) brightness(.58);
      transition:
        transform .7s cubic-bezier(.2,.8,.2,1),
        filter .7s ease,
        opacity .7s ease;
    }

    .stars,
    .nebula,
    .horizon,
    .content,
    .scanlines {
      transition:
        transform .7s cubic-bezier(.2,.8,.2,1),
        filter .7s ease,
        opacity .7s ease;
      transform-origin: center center;
    }

    body.video-focus .easteregg {
      top: 50%;
      right: 50%;
      transform: translate(50%, -50%) scale(1);
      align-items: center;
      z-index: 120;
    }

    body.video-focus .easteregg-button {
      opacity: 0;
      transform: scale(.65);
      pointer-events: none;
    }

    body.video-focus .easteregg-player {
      width: min(760px, 86vw);
      max-height: 82vh;
      transform: scale(1);
      box-shadow:
        0 0 55px rgba(30, 176, 236, .42),
        0 25px 90px rgba(0, 0, 0, .88);
    }

    body.video-focus .easteregg-player video {
      max-height: 72vh;
    }

    .easteregg-button {
      transition:
        opacity .35s ease,
        transform .35s ease,
        box-shadow .25s ease;
    }

    .easteregg {
      transition:
        opacity .7s ease,
        transform .7s cubic-bezier(.2,.9,.2,1.2),
        top .7s cubic-bezier(.2,.8,.2,1),
        right .7s cubic-bezier(.2,.8,.2,1);
    }

    .focus-overlay {
      position: fixed;
      inset: 0;
      z-index: 110;
      background: rgba(0, 3, 10, .18);
      opacity: 0;
      pointer-events: none;
      transition: opacity .55s ease;
    }

    body.video-focus .focus-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .easteregg {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 80;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      opacity: 0;
      transform: translateY(-18px) scale(.7);
      pointer-events: none;
      transition:
        opacity .7s ease,
        transform .7s cubic-bezier(.2,.9,.2,1.2);
    }

    .easteregg.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .easteregg-button {
      width: 58px;
      min-width: 58px;
      height: 58px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(112, 226, 255, .78);
      background:
        radial-gradient(circle at 40% 35%, rgba(158, 241, 255, .28), transparent 30%),
        linear-gradient(145deg, rgba(9, 35, 54, .96), rgba(2, 7, 15, .98));
      display: grid;
      place-items: center;
      box-shadow:
        inset 0 0 18px rgba(103, 220, 255, .18),
        0 0 16px rgba(44, 191, 255, .28);
      cursor: pointer;
      animation: easterPulse 2.7s ease-in-out infinite;
    }

    .easteregg-button:hover {
      transform: scale(1.08);
      box-shadow:
        inset 0 0 24px rgba(103, 220, 255, .26),
        0 0 30px rgba(44, 191, 255, .52);
    }

    .easteregg-button svg {
      width: 37px;
      height: 37px;
      filter: drop-shadow(0 0 7px rgba(98, 226, 255, .85));
    }

    .easteregg-player {
      position: relative;
      width: min(390px, calc(100vw - 44px));
      overflow: hidden;
      border: 1px solid rgba(96, 218, 255, .64);
      border-radius: 8px;
      background: rgba(0, 5, 12, .96);
      box-shadow:
        0 0 30px rgba(30, 176, 236, .28),
        0 16px 50px rgba(0, 0, 0, .72);
      opacity: 0;
      transform: translateY(-10px) scale(.96);
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }

    .easteregg-player.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .easteregg-player video {
      display: block;
      width: 100%;
      max-height: 52vh;
      background: #000;
    }

    .easteregg-close {
      position: absolute;
      top: 7px;
      right: 7px;
      z-index: 2;
      width: 31px;
      min-width: 31px;
      height: 31px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      letter-spacing: 0;
      box-shadow: 0 0 12px rgba(0,0,0,.65);
    }

    @keyframes easterPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          inset 0 0 18px rgba(103, 220, 255, .18),
          0 0 16px rgba(44, 191, 255, .28);
      }
      50% {
        transform: scale(1.045);
        box-shadow:
          inset 0 0 22px rgba(103, 220, 255, .26),
          0 0 28px rgba(44, 191, 255, .48);
      }
    }

    @media (max-width: 700px) {
      .easteregg {
        top: 12px;
        right: 12px;
      }

      .easteregg-button {
        width: 50px;
        min-width: 50px;
        height: 50px;
      }

      .easteregg-button svg {
        width: 31px;
        height: 31px;
      }
    }

    @media (max-width: 700px) {
      .panel {
        min-height: 82vh;
      }

      .eyebrow {
        margin-bottom: 1rem;
        letter-spacing: .27em;
      }

      .message {
        min-height: 54vh;
      }

      .line {
        font-size: clamp(2.35rem, 11vw, 4.6rem);
      }

      .line.you {
        font-size: clamp(8rem, 45vw, 17rem);
      }

      button {
        letter-spacing: .15em;
      }
    }
  </style>
</head>

<body>
  <main class="space">
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="horizon"></div>

    <section class="content">
      <div class="panel">
        <div class="eyebrow" id="eyebrow">PROJECT L33T // NEXT LEVEL</div>

        <div class="message" aria-live="polite">
          <div class="line" id="line1">CONGRATULATIONS</div>
          <div class="line" id="line2">YOU'RE MOVING TO THE NEXT LEVEL</div>
          <div class="line" id="line3"><span style="display:inline-block;border-bottom:4px solid currentColor;padding-bottom:0.05em;">YOUR</span> NEXT OPPONENT IS</div>
          <div class="line you" id="line4">YOU</div>
        </div>

        <div class="controls" id="controls">
          <button id="startButton" type="button">Activate the Future</button>
          <div class="hint">Audio wird durch einen Klick aktiviert</div>
        </div>
      </div>
    </section>



    <div class="focus-overlay" id="focusOverlay"></div>
    <aside class="easteregg" id="easteregg" aria-label="Verstecktes Easteregg">
      <button class="easteregg-button" id="eastereggButton"
              type="button" aria-label="Easteregg öffnen" title="???">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="eggGlow" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#d7fbff"/>
              <stop offset="50%" stop-color="#61dfff"/>
              <stop offset="100%" stop-color="#4478ff"/>
            </linearGradient>
          </defs>
          <path d="M32 6C21 6 13 20 13 34c0 13 8 23 19 23s19-10 19-23C51 20 43 6 32 6Z"
                fill="rgba(10,30,48,.92)" stroke="url(#eggGlow)" stroke-width="2.4"/>
          <ellipse cx="25" cy="32" rx="4.2" ry="6.2" fill="#9ff4ff"/>
          <ellipse cx="39" cy="32" rx="4.2" ry="6.2" fill="#9ff4ff"/>
          <path d="M25 44c4.5 3 9.5 3 14 0" fill="none" stroke="#77e9ff"
                stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="15" r="1.5" fill="#fff"/>
          <circle cx="47" cy="18" r="1" fill="#fff"/>
        </svg>
      </button>

      <div class="easteregg-player" id="eastereggPlayer">
        <button class="easteregg-close" id="eastereggClose"
                type="button" aria-label="Player schließen">×</button>
        <video id="eastereggVideo" controls preload="metadata" playsinline>
          <source src="easteregg.mp4" type="video/mp4">
          Dein Browser unterstützt dieses Video nicht.
        </video>
      </div>
    </aside>

    <div class="flash" id="flash"></div>
    <div class="scanlines"></div>
  </main>

  <script>
    const startButton = document.getElementById("startButton");
    const controls = document.getElementById("controls");
    const eyebrow = document.getElementById("eyebrow");
    const flash = document.getElementById("flash");
    const easteregg = document.getElementById("easteregg");
    const eastereggButton = document.getElementById("eastereggButton");
    const eastereggPlayer = document.getElementById("eastereggPlayer");
    const eastereggClose = document.getElementById("eastereggClose");
    const eastereggVideo = document.getElementById("eastereggVideo");
    const focusOverlay = document.getElementById("focusOverlay");

    const lines = [
      document.getElementById("line1"),
      document.getElementById("line2"),
      document.getElementById("line3"),
      document.getElementById("line4")
    ];

    let running = false;
    let selectedVoice = null;
    let eastereggUnlocked = false;
    let eastereggUnlockTimer = null;

    let audioContext = null;

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function createSpaceSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;

      // Das Easteregg erscheint erst, nachdem der komplette Sound
      // beim ersten Durchlauf zu Ende gespielt wurde.
      if (!eastereggUnlocked && !eastereggUnlockTimer) {
        eastereggUnlockTimer = window.setTimeout(() => {
          eastereggUnlocked = true;
          easteregg.classList.add("visible");
        }, 8400);
      }

      // Master-Ausgang
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.72, now + 0.08);
      master.gain.setValueAtTime(0.72, now + 4.8);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 8.3);
      master.connect(ctx.destination);

      // Einfacher räumlicher Echo-Bus
      const delay = ctx.createDelay(2.0);
      const feedback = ctx.createGain();
      const delayGain = ctx.createGain();

      delay.delayTime.setValueAtTime(0.42, now);
      feedback.gain.setValueAtTime(0.34, now);
      delayGain.gain.setValueAtTime(0.42, now);

      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(delayGain);
      delayGain.connect(master);

      // Tiefer Cinematic-Impact
      const impact = ctx.createOscillator();
      const impactGain = ctx.createGain();
      const impactFilter = ctx.createBiquadFilter();

      impact.type = "sine";
      impact.frequency.setValueAtTime(72, now);
      impact.frequency.exponentialRampToValueAtTime(31, now + 1.7);

      impactFilter.type = "lowpass";
      impactFilter.frequency.setValueAtTime(180, now);

      impactGain.gain.setValueAtTime(0.0001, now);
      impactGain.gain.exponentialRampToValueAtTime(1.0, now + 0.025);
      impactGain.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);

      impact.connect(impactFilter);
      impactFilter.connect(impactGain);
      impactGain.connect(master);

      impact.start(now);
      impact.stop(now + 2.6);

      // Breiter, warmer Space-Pad
      const padNotes = [
        { f: 110.00, detune: -8, volume: 0.24 },
        { f: 164.81, detune:  5, volume: 0.18 },
        { f: 220.00, detune: -3, volume: 0.13 }
      ];

      padNotes.forEach((note, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = index === 0 ? "sine" : "triangle";
        osc.frequency.setValueAtTime(note.f, now);
        osc.detune.setValueAtTime(note.detune, now);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(520 + index * 130, now);
        filter.frequency.linearRampToValueAtTime(1050 + index * 180, now + 4.5);
        filter.Q.setValueAtTime(0.8, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(note.volume, now + 0.9 + index * 0.15);
        gain.gain.setValueAtTime(note.volume, now + 4.2);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 7.6);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(master);
        gain.connect(delay);

        osc.start(now);
        osc.stop(now + 7.8);
      });

      // Schimmernder Rise
      const rise = ctx.createOscillator();
      const riseGain = ctx.createGain();
      const riseFilter = ctx.createBiquadFilter();

      rise.type = "sawtooth";
      rise.frequency.setValueAtTime(220, now + 0.4);
      rise.frequency.exponentialRampToValueAtTime(880, now + 3.4);

      riseFilter.type = "bandpass";
      riseFilter.frequency.setValueAtTime(650, now);
      riseFilter.frequency.exponentialRampToValueAtTime(2200, now + 3.4);
      riseFilter.Q.setValueAtTime(5.5, now);

      riseGain.gain.setValueAtTime(0.0001, now + 0.4);
      riseGain.gain.exponentialRampToValueAtTime(0.12, now + 2.3);
      riseGain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);

      rise.connect(riseFilter);
      riseFilter.connect(riseGain);
      riseGain.connect(master);
      riseGain.connect(delay);

      rise.start(now + 0.4);
      rise.stop(now + 4.1);

      // Deutlich hörbare Space-Melodie
      const melody = [
        { t: 2.55, f: 523.25, d: 0.60 }, // C5
        { t: 3.15, f: 659.25, d: 0.62 }, // E5
        { t: 3.82, f: 783.99, d: 0.72 }, // G5
        { t: 4.58, f: 987.77, d: 0.78 }, // B5
        { t: 5.42, f: 1046.50, d: 1.35 }, // C6
        { t: 6.35, f: 783.99, d: 1.20 }  // G5
      ];

      melody.forEach((note, index) => {
        const oscA = ctx.createOscillator();
        const oscB = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        oscA.type = "triangle";
        oscB.type = "sine";

        oscA.frequency.setValueAtTime(note.f, now + note.t);
        oscB.frequency.setValueAtTime(note.f, now + note.t);
        oscB.detune.setValueAtTime(index % 2 === 0 ? 7 : -7, now + note.t);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(2400, now + note.t);
        filter.Q.setValueAtTime(1.2, now + note.t);

        gain.gain.setValueAtTime(0.0001, now + note.t);
        gain.gain.exponentialRampToValueAtTime(0.21, now + note.t + 0.06);
        gain.gain.setValueAtTime(0.18, now + note.t + note.d * 0.42);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + note.t + note.d);

        oscA.connect(filter);
        oscB.connect(filter);
        filter.connect(gain);
        gain.connect(master);
        gain.connect(delay);

        oscA.start(now + note.t);
        oscB.start(now + note.t);
        oscA.stop(now + note.t + note.d + 0.05);
        oscB.stop(now + note.t + note.d + 0.05);
      });

      // Heller Abschluss-Schimmer
      const bell = ctx.createOscillator();
      const bellGain = ctx.createGain();

      bell.type = "sine";
      bell.frequency.setValueAtTime(1567.98, now + 5.45);

      bellGain.gain.setValueAtTime(0.0001, now + 5.45);
      bellGain.gain.exponentialRampToValueAtTime(0.09, now + 5.50);
      bellGain.gain.exponentialRampToValueAtTime(0.0001, now + 7.7);

      bell.connect(bellGain);
      bellGain.connect(master);
      bellGain.connect(delay);

      bell.start(now + 5.45);
      bell.stop(now + 7.8);
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function chooseVoice() {
      const voices = speechSynthesis.getVoices();

      const preferredNames = [
        "Microsoft Aria Online",
        "Microsoft Jenny Online",
        "Google UK English Female",
        "Samantha",
        "Karen",
        "Moira",
        "Tessa",
        "Victoria",
        "Zira"
      ];

      selectedVoice =
        voices.find(v =>
          preferredNames.some(name =>
            v.name.toLowerCase().includes(name.toLowerCase())
          )
        ) ||
        voices.find(v =>
          /^en(-|_)/i.test(v.lang) &&
          /female|woman|aria|jenny|samantha|karen|zira|victoria/i.test(v.name)
        ) ||
        voices.find(v => /^en(-|_)/i.test(v.lang)) ||
        voices[0] ||
        null;
    }

    chooseVoice();
    speechSynthesis.onvoiceschanged = chooseVoice;

    function speak(text, rate = 0.84, pitch = 1.08) {
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = rate;
        utterance.pitch = pitch;
        utterance.volume = 1;

        if (selectedVoice) {
          utterance.voice = selectedVoice;
        }

        utterance.onend = resolve;
        utterance.onerror = resolve;
        speechSynthesis.speak(utterance);
      });
    }

    function showLine(index) {
      lines.forEach((line, i) => {
        line.classList.remove("active", "fade");

        if (i < index) {
          line.classList.add("fade");
        }
      });

      lines[index].classList.add("active");
    }

    async function runSequence() {
      if (running) return;
      running = true;

      speechSynthesis.cancel();
      controls.classList.add("hidden");
      eyebrow.style.opacity = "0.25";

      showLine(0);
      await wait(250);
      await speak("Congratulations.", 0.8, 1.1);
      await wait(350);

      showLine(1);
      await wait(250);
      await speak("You're moving to the next level.", 0.84, 1.08);
      await wait(500);

      showLine(2);
      await wait(250);
      await speak("Your next opponent is", 0.78, 1.05);

      // Lange filmische Pause vor der Enthüllung.
      await wait(2500);

      document.body.classList.add("impact");
      createSpaceSound();

      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");

      showLine(3);

      // Die Wirkung kommt aus Pause, Blitz, Zoom und Erschütterung.
      await wait(520);
      await speak("You.", 0.72, 0.9);

      await wait(700);
      document.body.classList.remove("impact");

      await wait(2500);
      controls.classList.remove("hidden");
      startButton.textContent = "Replay";
      eyebrow.style.opacity = "0.55";
      running = false;
    }


    function closeEastereggPlayer() {
      eastereggVideo.pause();
      eastereggPlayer.classList.remove("open");
      document.body.classList.remove("video-focus");
    }

    eastereggButton.addEventListener("click", async () => {
      const willOpen = !eastereggPlayer.classList.contains("open");

      if (willOpen) {
        document.body.classList.add("video-focus");
        eastereggPlayer.classList.add("open");

        try {
          await eastereggVideo.play();
        } catch (error) {
          // Der Player bleibt geöffnet, falls der Browser einen
          // zusätzlichen Klick auf Play verlangt.
        }
      } else {
        closeEastereggPlayer();
      }
    });

    eastereggClose.addEventListener("click", event => {
      event.stopPropagation();
      closeEastereggPlayer();
    });

    focusOverlay.addEventListener("click", closeEastereggPlayer);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && eastereggPlayer.classList.contains("open")) {
        closeEastereggPlayer();
      }
    });


    eastereggVideo.addEventListener("ended", () => {
      eastereggPlayer.classList.remove("open");
      document.body.classList.remove("video-focus");
      eastereggVideo.pause();
      eastereggVideo.currentTime = 0;
    });

    startButton.addEventListener("click", runSequence);
  </script>
</body>
