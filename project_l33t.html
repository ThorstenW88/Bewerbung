<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arbor Vitae – Pfad des Wissens</title>
<style>
  :root {
    --gold: #d7ad58;
    --gold-bright: #f0d38b;
    --green: #85cf63;
    --red: #a64032;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #050403;
    font-family: Georgia, "Times New Roman", serif;
    overflow-x: hidden;
  }

  body {
    display: grid;
    place-items: center;
  }

  .stage {
    position: relative;
    width: min(100vw, 1536px);
    aspect-ratio: 1536 / 1024;
    overflow: hidden;
    background:
      url("images/project-l33t-background.png") center / cover no-repeat;
    box-shadow: 0 0 70px rgba(0,0,0,.9);
    isolation: isolate;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 31%, rgba(255,220,116,.08), transparent 24%),
      linear-gradient(rgba(0,0,0,.02), rgba(0,0,0,.08));
    animation: scenePulse 6s ease-in-out infinite;
  }

  @keyframes scenePulse {
    0%,100% { opacity: .75; }
    50% { opacity: 1; }
  }

  .embers {
    position: absolute;
    inset: -10%;
    z-index: 4;
    pointer-events: none;
    opacity: .75;
    background:
      radial-gradient(circle, rgba(255,182,65,.95) 0 1px, transparent 2px) 0 0 / 92px 92px,
      radial-gradient(circle, rgba(255,223,130,.7) 0 1px, transparent 2px) 34px 18px / 137px 137px,
      radial-gradient(circle, rgba(255,120,30,.55) 0 1px, transparent 2px) 10px 64px / 171px 171px;
    animation: embers 16s linear infinite;
  }

  @keyframes embers {
    from { transform: translate3d(0, 45px, 0); }
    to { transform: translate3d(22px, -95px, 0); }
  }

  .guardian-eye {
    display: none;
    position: absolute;
    z-index: 8;
    width: 1.2%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #ffd76e;
    box-shadow:
      0 0 8px #fff1b2,
      0 0 18px #ffb425,
      0 0 38px rgba(255,103,16,.9),
      0 0 68px rgba(255,114,20,.4);
    animation: eyeGlow 2s ease-in-out infinite;
    pointer-events: none;
  }

  .guardian-eye.left-a  { left: 17.8%; top: 16.6%; }
  .guardian-eye.left-b  { left: 20.1%; top: 16.7%; }
  .guardian-eye.right-a { right: 20.1%; top: 16.7%; }
  .guardian-eye.right-b { right: 17.8%; top: 16.6%; }

  @keyframes eyeGlow {
    0%,100% { transform: scale(.85); filter: brightness(.95); }
    50% { transform: scale(1.18); filter: brightness(1.45); }
  }

  .puzzle-ui {
    position: absolute;
    left: 49.55%;
    top: 62.95%;
    width: 33.85%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .sequence {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 1.15%;
    width: 100%;
  }

  .cell {
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
  }

  .cell input {
    width: 100%;
    height: 100%;
    display: block;
    margin: 0;
    border: none;
    background: transparent;
    color: var(--gold-bright);
    text-align: center;
    vertical-align: middle;
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(14px, 1.6vw, 28px);
    font-weight: bold;
    line-height: 1;
    padding: 0;
    outline: none;
    box-shadow: none;
    caret-color: #f4d27d;
    text-shadow:
      0 0 4px rgba(255,223,139,.55),
      0 0 10px rgba(216,173,85,.28);
    transition:
      color .25s ease,
      text-shadow .25s ease,
      transform .25s ease,
      filter .25s ease;
  }

  .cell input:focus {
    transform: scale(1.05);
    text-shadow:
      0 0 6px rgba(255,242,184,.9),
      0 0 18px rgba(216,173,85,.65),
      0 0 32px rgba(255,141,35,.28);
    animation: inscriptionPulse .9s ease-out;
  }

  @keyframes inscriptionPulse {
    0% {
      filter: brightness(1);
      transform: scale(1);
    }
    45% {
      filter: brightness(1.55);
      transform: scale(1.09);
    }
    100% {
      filter: brightness(1);
      transform: scale(1.05);
    }
  }

  .cell input.correct {
    color: #d5f0ac;
    text-shadow:
      0 0 6px rgba(201,239,160,.8),
      0 0 18px rgba(133,207,99,.5);
  }

  .cell input.wrong {
    color: #f0aaa1;
    text-shadow:
      0 0 6px rgba(240,170,161,.78),
      0 0 16px rgba(166,64,50,.5);
  }

  .cell {
    position: relative;
  }

  .cell::after {
    content: "";
    position: absolute;
    inset: 20%;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,221,128,.22), transparent 70%);
    transition: opacity .25s ease;
  }

  .cell:focus-within::after {
    opacity: 1;
  }

  .spacer {
    aspect-ratio: 1 / 1;
    pointer-events: none;
  }

  .check-hotspot {
    position: absolute;
    left: 49.85%;
    top: 69.55%;
    width: 12.2%;
    height: 4.75%;
    transform: translateX(-50%);
    z-index: 12;
    border: 0;
    outline: 0;
    background: transparent;
    box-shadow: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .check-hotspot:hover,
  .check-hotspot:focus,
  .check-hotspot:focus-visible,
  .check-hotspot:active {
    border: 0;
    outline: 0;
    background: transparent;
    box-shadow: none;
  }

  .status-message {
    position: absolute;
    left: 50%;
    top: 77.1%;
    width: 34%;
    transform: translateX(-50%);
    z-index: 12;
    color: #e2c987;
    text-align: center;
    letter-spacing: .06em;
    font-size: clamp(10px, 1vw, 16px);
    text-shadow: 0 2px 5px #000;
    min-height: 20px;
  }

  .next-hotspot {
    position: absolute;
    right: 1.7%;
    bottom: 2%;
    width: 13%;
    height: 4.6%;
    z-index: 12;
    border: 0;
    outline: 0;
    background: transparent;
    box-shadow: none;
    cursor: not-allowed;
    opacity: .42;
    transition: opacity .35s ease;
    appearance: none;
    -webkit-appearance: none;
  }

  .next-hotspot.ready,
  .next-hotspot:hover,
  .next-hotspot:focus,
  .next-hotspot:focus-visible,
  .next-hotspot:active {
    cursor: pointer;
    opacity: 1;
    border: 0;
    outline: 0;
    background: transparent;
    box-shadow: none;
  }

  .success-flash {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    background:
      radial-gradient(circle at 50% 72%, rgba(255,214,108,.24), transparent 24%),
      radial-gradient(circle at 50% 30%, rgba(255,232,145,.18), transparent 28%);
  }

  .success-flash.active {
    animation: successFlash 1.5s ease;
  }

  @keyframes successFlash {
    0% { opacity: 0; }
    25% { opacity: 1; }
    100% { opacity: 0; }
  }

  .screen-gate {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: grid;
    place-items: center;
    background: rgba(3,3,2,.92);
    transition: opacity 1s ease, visibility 1s ease;
  }

  .screen-gate.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .start-button {
    padding: 16px 34px;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    background: linear-gradient(#30100e,#1d0807);
    font: 18px Georgia, "Times New Roman", serif;
    letter-spacing: .15em;
    cursor: pointer;
    box-shadow:
      0 0 0 4px rgba(0,0,0,.45),
      0 0 24px rgba(216,173,85,.14);
    transition: .25s ease;
  }

  .start-button:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 4px rgba(0,0,0,.45),
      0 0 34px rgba(216,173,85,.28);
  }

  /* Gravur-, Licht- und Kamerafahrt-Effekte */
  .stage {
    transform-origin: 50% 42%;
    transition:
      transform 2.4s cubic-bezier(.2,.75,.2,1),
      filter 2.4s ease;
  }

  .stage.camera-travel {
    transform: scale(1.16) translateY(4.5%);
    filter: brightness(1.12) contrast(1.04);
  }

  .tree-breath {
    position: absolute;
    left: 50%;
    top: 5%;
    width: 52%;
    height: 48%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
    opacity: .34;
    mix-blend-mode: screen;
    filter: blur(10px);
    background:
      radial-gradient(circle at 36% 44%, rgba(174,255,145,.10), transparent 17%),
      radial-gradient(circle at 58% 32%, rgba(255,238,154,.12), transparent 20%),
      radial-gradient(circle at 52% 55%, rgba(255,215,102,.08), transparent 22%);
    animation: treeBreath 6s ease-in-out infinite;
  }

  @keyframes treeBreath {
    0%,100% {
      transform: translateX(-50%) scale(1);
      opacity: .28;
    }
    50% {
      transform: translateX(-50%) scale(1.045);
      opacity: .46;
    }
  }

  .gold-sweep {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    opacity: .22;
    mix-blend-mode: screen;
    background:
      linear-gradient(
        115deg,
        transparent 0 38%,
        rgba(255,225,145,.0) 42%,
        rgba(255,225,145,.24) 47%,
        rgba(255,247,200,.38) 49%,
        rgba(255,225,145,.12) 52%,
        transparent 57% 100%
      );
    transform: translateX(-48%);
    animation: goldSweep 8s ease-in-out infinite;
  }

  @keyframes goldSweep {
    0%,18% { transform: translateX(-52%); opacity: 0; }
    30% { opacity: .25; }
    52% { transform: translateX(52%); opacity: .18; }
    62%,100% { transform: translateX(52%); opacity: 0; }
  }

  .mist {
    position: absolute;
    left: -10%;
    right: -10%;
    bottom: -4%;
    height: 30%;
    z-index: 7;
    pointer-events: none;
    opacity: .24;
    filter: blur(22px);
    background:
      radial-gradient(ellipse at 20% 70%, rgba(210,210,190,.22), transparent 34%),
      radial-gradient(ellipse at 58% 72%, rgba(180,190,170,.18), transparent 38%),
      radial-gradient(ellipse at 84% 64%, rgba(210,200,175,.15), transparent 30%);
    animation: mistDrift 12s ease-in-out infinite alternate;
  }

  @keyframes mistDrift {
    from { transform: translateX(-2%) scaleY(.95); }
    to { transform: translateX(3%) scaleY(1.06); }
  }

  .engraving-particles {
    position: absolute;
    z-index: 15;
    width: 10px;
    height: 10px;
    pointer-events: none;
    opacity: 0;
  }

  .engraving-particles.active {
    animation: particleBurst .7s ease-out forwards;
  }

  .engraving-particles::before,
  .engraving-particles::after {
    content: "";
    position: absolute;
    inset: -12px;
    background:
      radial-gradient(circle, rgba(255,235,170,.95) 0 1px, transparent 2px) 0 0 / 10px 10px,
      radial-gradient(circle, rgba(255,182,65,.85) 0 1px, transparent 2px) 4px 5px / 13px 13px;
  }

  .engraving-particles::after {
    transform: rotate(45deg) scale(.8);
    opacity: .7;
  }

  @keyframes particleBurst {
    0% {
      opacity: 0;
      transform: translate(-50%,-50%) scale(.4);
    }
    20% { opacity: 1; }
    100% {
      opacity: 0;
      transform: translate(-50%,-85%) scale(1.7);
    }
  }

  .cell input.inscribing {
    animation: engraveNumber .48s ease-out;
  }

  @keyframes engraveNumber {
    0% {
      opacity: .1;
      transform: scale(.82);
      filter: blur(2px) brightness(2);
      text-shadow:
        0 0 18px rgba(255,242,184,1),
        0 0 34px rgba(255,160,38,.8);
    }
    60% {
      opacity: 1;
      transform: scale(1.08);
      filter: blur(0) brightness(1.6);
    }
    100% {
      opacity: 1;
      transform: scale(1);
      filter: brightness(1);
    }
  }

  .path-light {
    position: absolute;
    left: 50%;
    top: 35%;
    width: 20%;
    height: 42%;
    transform: translateX(-50%);
    z-index: 9;
    pointer-events: none;
    opacity: 0;
    clip-path: polygon(42% 0,58% 0,100% 100%,0 100%);
    background:
      linear-gradient(
        to bottom,
        rgba(255,242,184,.04),
        rgba(255,218,115,.2) 48%,
        rgba(255,182,45,.28) 100%
      );
    filter: blur(9px);
    transition: opacity 1.2s ease;
  }

  .stage.camera-travel .path-light {
    opacity: .9;
    animation: pathPulse 1.4s ease-in-out infinite;
  }

  @keyframes pathPulse {
    0%,100% { filter: blur(9px) brightness(1); }
    50% { filter: blur(12px) brightness(1.35); }
  }

  .transition-title {
    position: absolute;
    left: 50%;
    top: 43%;
    transform: translate(-50%,-50%) scale(.92);
    z-index: 25;
    color: #f0d38b;
    font-size: clamp(24px, 3.4vw, 54px);
    letter-spacing: .16em;
    text-align: center;
    text-shadow:
      0 0 10px rgba(255,231,155,.75),
      0 0 28px rgba(216,173,85,.35),
      0 4px 12px rgba(0,0,0,.9);
    opacity: 0;
    pointer-events: none;
  }

  .transition-title.show {
    animation: titleReveal 2.2s ease forwards;
  }

  @keyframes titleReveal {
    0% { opacity: 0; transform: translate(-50%,-46%) scale(.9); }
    35% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-56%) scale(1.04); }
  }

  @media (max-width: 900px) {
    .stage {
      width: 100vw;
      height: 100vh;
      aspect-ratio: auto;
      background-size: cover;
      background-position: center;
    }

    .puzzle-ui {
      left: 49.55%;
      top: 62.95%;
      width: 41.2%;
    }

    .check-hotspot {
      left: 49.85%;
      top: 69.55%;
      width: 15%;
      height: 4.75%;
    }

    .status-message {
      top: 77%;
      width: 48%;
    }
  }

  /* PROJECT L33T – Ebene II */
  .level-two {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 28%, rgba(120,170,88,.16), transparent 22%),
      linear-gradient(to bottom, rgba(3,3,2,.18), rgba(3,2,1,.88));
  }

  .level-two.revealed {
    visibility: visible;
    pointer-events: auto;
    animation: levelReveal 2.2s ease forwards;
  }

  @keyframes levelReveal {
    from { opacity: 0; filter: blur(9px) brightness(.45); transform: scale(1.08); }
    to   { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
  }

  .road-depth {
    position: absolute;
    left: 50%;
    bottom: -18%;
    width: 76%;
    height: 92%;
    transform: translateX(-50%);
    clip-path: polygon(46% 0,54% 0,100% 100%,0 100%);
    background:
      repeating-linear-gradient(to bottom, rgba(238,205,132,.1) 0 2px, transparent 2px 88px),
      linear-gradient(to bottom, rgba(218,173,86,.06), rgba(69,42,16,.48));
    filter: drop-shadow(0 0 26px rgba(216,173,85,.2));
    animation: roadFlow 5s linear infinite;
  }

  @keyframes roadFlow {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 0 176px, 0 0; }
  }

  .column {
    position: absolute;
    top: 6%;
    width: 8%;
    height: 88%;
    border: 1px solid rgba(216,173,85,.3);
    background: linear-gradient(90deg, rgba(15,10,6,.94), rgba(113,78,37,.5), rgba(12,8,5,.96));
    box-shadow: inset 0 0 28px rgba(0,0,0,.8), 0 0 30px rgba(0,0,0,.7);
  }
  .column::before,.column::after { content:""; position:absolute; left:-18%; width:136%; height:5%; background:linear-gradient(#b38b47,#33200e); border:1px solid rgba(240,211,139,.25); }
  .column::before { top:0; }
  .column::after { bottom:0; }
  .column.left { left:7%; transform: perspective(700px) rotateY(9deg); }
  .column.right { right:7%; transform: perspective(700px) rotateY(-9deg); }

  .l33t-monolith {
    position: relative;
    z-index: 4;
    width: min(70%, 760px);
    padding: clamp(24px,4vw,56px);
    text-align: center;
    color: #d9c28a;
    background: linear-gradient(180deg, rgba(16,12,8,.9), rgba(5,4,3,.96));
    border: 1px solid rgba(216,173,85,.46);
    box-shadow: 0 0 0 7px rgba(0,0,0,.38), 0 0 60px rgba(216,173,85,.14), inset 0 0 45px rgba(0,0,0,.75);
  }
  .l33t-monolith::before { content:""; position:absolute; inset:9px; border:1px solid rgba(216,173,85,.13); pointer-events:none; }
  .level-kicker { font-size:clamp(10px,1vw,14px); letter-spacing:.45em; color:#8fc96e; }
  .l33t-title { margin:.22em 0 .1em; font-size:clamp(50px,9vw,132px); letter-spacing:.18em; color:#f0d38b; text-shadow:0 0 15px rgba(240,211,139,.5),0 0 50px rgba(133,207,99,.2); }
  .l33t-rule { width:60%; height:1px; margin:18px auto 24px; background:linear-gradient(90deg,transparent,#d7ad58,transparent); }
  .l33t-text { max-width:580px; margin:auto; font-size:clamp(14px,1.45vw,21px); line-height:1.7; letter-spacing:.08em; }
  .glyph-row { margin-top:28px; display:flex; justify-content:center; gap:clamp(18px,4vw,54px); font-size:clamp(22px,3vw,42px); color:#8b7348; }
  .glyph-row span { animation:glyphPulse 3.6s ease-in-out infinite; }
  .glyph-row span:nth-child(2){animation-delay:.7s}.glyph-row span:nth-child(3){animation-delay:1.4s}
  @keyframes glyphPulse { 0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px);text-shadow:0 0 16px rgba(216,173,85,.55)} }
  .continue-hint { margin-top:30px; font-size:11px; letter-spacing:.28em; opacity:.55; }

  /* Interaktives L33T-Terminal */
  .terminal-shell {
    margin: 26px auto 0;
    width: min(92%, 620px);
    text-align: left;
    border: 1px solid rgba(133,207,99,.42);
    background: rgba(1,8,3,.82);
    box-shadow: inset 0 0 28px rgba(30,100,40,.18), 0 0 24px rgba(133,207,99,.08);
    padding: 18px 20px 16px;
    font-family: "Courier New", monospace;
    color: #9ee27d;
    position: relative;
  }
  .terminal-shell::after {
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.12;
    background:repeating-linear-gradient(to bottom,transparent 0 3px,rgba(180,255,160,.2) 3px 4px);
  }
  .terminal-head { display:flex; justify-content:space-between; gap:16px; font-size:11px; letter-spacing:.18em; opacity:.75; }
  .terminal-output { min-height:112px; margin:16px 0 12px; line-height:1.55; font-size:clamp(12px,1.1vw,15px); white-space:pre-line; }
  .terminal-line { display:flex; align-items:center; gap:9px; border-top:1px solid rgba(133,207,99,.18); padding-top:12px; }
  .terminal-prompt { color:#f0d38b; }
  .terminal-input { flex:1; min-width:0; border:0; outline:0; background:transparent; color:#caffad; font:inherit; text-transform:lowercase; caret-color:#f0d38b; }
  .terminal-button { border:1px solid rgba(216,173,85,.5); background:rgba(216,173,85,.08); color:#f0d38b; padding:7px 11px; font-family:inherit; letter-spacing:.12em; cursor:pointer; }
  .terminal-button:hover { background:rgba(216,173,85,.18); box-shadow:0 0 13px rgba(216,173,85,.2); }
  .terminal-help { margin-top:9px; font-size:10px; letter-spacing:.13em; opacity:.48; }
  .l33t-monolith.unlocked { animation:monolithUnlock 1.4s ease forwards; }
  @keyframes monolithUnlock {
    0%{box-shadow:0 0 0 7px rgba(0,0,0,.38),0 0 60px rgba(216,173,85,.14),inset 0 0 45px rgba(0,0,0,.75)}
    45%{box-shadow:0 0 0 7px rgba(0,0,0,.2),0 0 110px rgba(133,207,99,.65),inset 0 0 70px rgba(133,207,99,.18)}
    100%{box-shadow:0 0 0 7px rgba(0,0,0,.38),0 0 80px rgba(216,173,85,.25),inset 0 0 45px rgba(0,0,0,.7)}
  }
  .path-seal { margin:18px auto 0; width:54px; height:54px; border:1px solid rgba(216,173,85,.45); transform:rotate(45deg) scale(.2); opacity:0; transition:1.2s ease; }
  .path-seal::before { content:"III"; position:absolute; inset:0; display:grid; place-items:center; transform:rotate(-45deg); color:#f0d38b; font-family:Georgia,serif; }
  .path-seal.open { transform:rotate(45deg) scale(1); opacity:1; box-shadow:0 0 30px rgba(216,173,85,.35); }

  .terminal-output { max-height:180px; overflow-y:auto; }
  .terminal-output > div { margin:2px 0; }
  .terminal-gold { color:#f0d38b; text-shadow:0 0 10px rgba(240,211,139,.25); }
  .terminal-dim { opacity:.55; }
  .terminal-error { color:#d46b5f; }
  .terminal-command { color:#caffad; opacity:.9; }

/* ===== PROJECT L33T – CHAPTER II ===== */
#chapterTwo {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  overflow-y: auto;
  background:
    radial-gradient(circle at 50% 18%, rgba(126,96,35,.22), transparent 30%),
    linear-gradient(rgba(4,5,4,.28), rgba(2,3,2,.84)),
    repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 90px),
    #050605;
  color: #a8d79a;
  font-family: Georgia, 'Times New Roman', serif;

  .hidden-ip-clue {
    color: transparent !important;
    user-select: text;
    -webkit-user-select: text;
    cursor: text;
    letter-spacing: .28em;
  }
  .hidden-ip-clue::selection {
    color: #f0d38b;
    background: rgba(133,207,99,.22);
  }
  .hidden-ip-clue::-moz-selection {
    color: #f0d38b;
    background: rgba(133,207,99,.22);
  }

  /* PATCH: Markierung brennt den Hinweis ein und legt nur berührte Bildzeilen frei. */
  .hidden-ip-clue {
    position: relative;
    z-index: 7;
    transition: color .65s ease, text-shadow .65s ease, filter .65s ease;
  }
  .hidden-ip-clue.burning,
  .hidden-ip-clue.burned {
    color: #ffcf68 !important;
    text-shadow:
      0 -2px 2px #fff3b0,
      0 0 7px #ffb000,
      0 0 18px #ff5a00,
      0 0 34px rgba(255,45,0,.9);
  }
  .hidden-ip-clue.burning { animation: clueIgnition 1.45s ease-out both; }
  .hidden-ip-clue.burned { color:#d8893d !important; filter: sepia(.25); }
  .hidden-ip-clue::after {
    content:"";
    position:absolute;
    left:4%; right:4%; bottom:-16px;
    height:34px;
    pointer-events:none;
    opacity:0;
    transform:scaleY(.25);
    transform-origin:bottom;
    background:
      radial-gradient(ellipse at 8% 100%, #fff6a5 0 7%, #ffad00 8% 20%, #f33 21% 34%, transparent 36%),
      radial-gradient(ellipse at 24% 100%, #fff6a5 0 6%, #ffad00 7% 19%, #f33 20% 35%, transparent 37%),
      radial-gradient(ellipse at 43% 100%, #fff6a5 0 8%, #ffad00 9% 22%, #f33 23% 37%, transparent 39%),
      radial-gradient(ellipse at 62% 100%, #fff6a5 0 6%, #ffad00 7% 20%, #f33 21% 34%, transparent 36%),
      radial-gradient(ellipse at 79% 100%, #fff6a5 0 8%, #ffad00 9% 22%, #f33 23% 38%, transparent 40%),
      radial-gradient(ellipse at 94% 100%, #fff6a5 0 6%, #ffad00 7% 19%, #f33 20% 34%, transparent 36%);
    filter:blur(.4px) drop-shadow(0 -7px 8px #ff4b00);
  }
  .hidden-ip-clue.burning::after { animation: flameRise 1.45s ease-out both; }
  @keyframes clueIgnition {
    0% { transform:scale(.98); filter:brightness(.4); }
    18% { transform:scale(1.055); filter:brightness(2.4); }
    45% { transform:scale(1.015); filter:brightness(1.55); }
    100% { transform:scale(1); filter:brightness(1); }
  }
  @keyframes flameRise {
    0% { opacity:0; transform:translateY(13px) scaleY(.15); }
    18% { opacity:1; transform:translateY(-5px) scaleY(1.35); }
    55% { opacity:.95; transform:translateY(-11px) scaleY(.9); }
    100% { opacity:0; transform:translateY(-25px) scaleY(.2); }
  }

  .selection-reveal-curtain {
    position:absolute;
    inset:0;
    z-index:2;
    display:grid;
    grid-template-rows:repeat(48,1fr);
    pointer-events:none;
    opacity:0;
    transition:opacity .45s ease;
  }
  .level-two.revealed .selection-reveal-curtain { opacity:1; }
  .selection-reveal-line {
    position:relative;
    min-height:0;
    background:rgba(2,2,1,.94);
    box-shadow:inset 0 1px rgba(110,80,35,.08);
    transition:opacity .48s ease, filter .48s ease;
  }
  .selection-reveal-line.revealing {
    opacity:0;
    filter:brightness(2.5);
  }
  .selection-reveal-line.revealing::after {
    content:"";
    position:absolute;
    left:0; right:0; bottom:-5px;
    height:10px;
    background:linear-gradient(to bottom,transparent,#ffbe35 35%,#ff4a00 58%,transparent);
    box-shadow:0 0 12px #ff6a00,0 0 28px rgba(255,45,0,.75);
    animation:scanFire .72s ease-out both;
  }
  @keyframes scanFire {
    0% { opacity:0; transform:scaleX(.05); }
    25% { opacity:1; transform:scaleX(1); }
    100% { opacity:0; transform:scaleX(1); }
  }


  /* V2: sichtbare Feuer-Ebene über dem gesamten Level */
  .burn-fx-layer {
    position:absolute; inset:0; z-index:30; pointer-events:none; overflow:hidden;
  }
  .burn-flash {
    position:absolute; inset:0; opacity:0;
    background:radial-gradient(circle at 50% var(--burn-y,50%), rgba(255,236,150,.75) 0 3%, rgba(255,122,0,.38) 8%, rgba(255,40,0,.14) 20%, transparent 42%);
    mix-blend-mode:screen;
  }
  .burn-fx-layer.active .burn-flash { animation:burnFlash 1.15s ease-out both; }
  .burn-scan {
    position:absolute; left:-4%; width:108%; height:86px; top:calc(var(--burn-y,50%) - 43px);
    opacity:0; transform:scaleX(.05);
    background:
      radial-gradient(ellipse at 5% 100%,transparent 0 34%,#ff2b00 36% 41%,#ff9d00 43% 51%,#fff1a0 53% 56%,transparent 58%),
      radial-gradient(ellipse at 17% 100%,transparent 0 30%,#ff2b00 32% 40%,#ff9d00 42% 50%,#fff1a0 52% 55%,transparent 57%),
      radial-gradient(ellipse at 31% 100%,transparent 0 35%,#ff2b00 37% 43%,#ff9d00 45% 52%,#fff1a0 54% 57%,transparent 59%),
      radial-gradient(ellipse at 48% 100%,transparent 0 29%,#ff2b00 31% 39%,#ff9d00 41% 50%,#fff1a0 52% 55%,transparent 57%),
      radial-gradient(ellipse at 65% 100%,transparent 0 34%,#ff2b00 36% 43%,#ff9d00 45% 52%,#fff1a0 54% 57%,transparent 59%),
      radial-gradient(ellipse at 82% 100%,transparent 0 30%,#ff2b00 32% 40%,#ff9d00 42% 50%,#fff1a0 52% 55%,transparent 57%),
      radial-gradient(ellipse at 96% 100%,transparent 0 34%,#ff2b00 36% 43%,#ff9d00 45% 52%,#fff1a0 54% 57%,transparent 59%);
    filter:drop-shadow(0 0 10px #ff8a00) drop-shadow(0 0 28px #ff2b00);
    transform-origin:center;
  }
  .burn-fx-layer.active .burn-scan { animation:burnScan 1.5s cubic-bezier(.15,.8,.2,1) both; }
  .burn-spark {
    position:absolute; left:var(--x); top:var(--y); width:4px; height:18px; border-radius:50%;
    background:linear-gradient(#fff6ae,#ff9b00 45%,#ff2b00 72%,transparent);
    box-shadow:0 0 8px #ff7100; opacity:0;
    transform:rotate(var(--r)) translateY(0) scale(.6);
  }
  .burn-fx-layer.active .burn-spark { animation:sparkFly var(--d) ease-out var(--delay) both; }
  @keyframes burnFlash { 0%{opacity:0} 12%{opacity:1} 38%{opacity:.72} 100%{opacity:0} }
  @keyframes burnScan { 0%{opacity:0;transform:scaleX(.03) scaleY(.35)} 16%{opacity:1;transform:scaleX(1) scaleY(1.25)} 55%{opacity:1;transform:scaleX(1) translateY(-16px) scaleY(.95)} 100%{opacity:0;transform:scaleX(1) translateY(-42px) scaleY(.2)} }
  @keyframes sparkFly { 0%{opacity:0;transform:rotate(var(--r)) translateY(8px) scale(.4)} 15%{opacity:1} 100%{opacity:0;transform:rotate(var(--r)) translateY(-150px) scale(1)} }

</style>
</head>
<body>
<div class="stage" id="stage">
<div class="tree-breath"></div>
<div class="gold-sweep"></div>
<div class="mist"></div>
<div class="path-light"></div>
<div class="transition-title" id="transitionTitle">AD PROXIMUM</div>
<div class="embers"></div>
<span class="guardian-eye left-a"></span>
<span class="guardian-eye left-b"></span>
<span class="guardian-eye right-a"></span>
<span class="guardian-eye right-b"></span>
<div class="puzzle-ui">
<div class="sequence">
<div class="spacer"></div>
<div class="spacer"></div>
<div class="spacer"></div>
<div class="cell">
<input aria-label="Fehlende Fibonacci-Zahl 3" data-answer="3" id="fib3" inputmode="numeric" maxlength="2"/>
<span class="engraving-particles"></span>
</div>
<div class="spacer"></div>
<div class="cell">
<input aria-label="Fehlende Fibonacci-Zahl 8" data-answer="8" id="fib8" inputmode="numeric" maxlength="2"/>
<span class="engraving-particles"></span>
</div>
<div class="spacer"></div>
<div class="cell">
<input aria-label="Fehlende Fibonacci-Zahl 21" data-answer="21" id="fib21" inputmode="numeric" maxlength="2"/>
<span class="engraving-particles"></span>
</div>
<div class="spacer"></div>
</div>
</div>
<button aria-label="Fibonacci-Folge prüfen" class="check-hotspot" onclick="checkSequence()"></button>
<div class="status-message" id="statusMessage"></div>
<button aria-label="Nächste Ebene" class="next-hotspot" id="nextButton" onclick="goNext()"></button>
<div class="success-flash" id="successFlash"></div>
<div class="screen-gate" id="gate">
<button class="start-button" onclick="startScene()">INITIUM VIA</button>
</div>

</div>

<script>
  function startScene() {
    document.getElementById("gate").classList.add("hidden");
  }

  document.querySelectorAll(".cell input").forEach(input => {
    input.addEventListener("input", () => {
      input.value = input.value.replace(/[^0-9]/g, "");

      input.classList.remove("inscribing");
      void input.offsetWidth;
      input.classList.add("inscribing");

      const particles = input.parentElement.querySelector(".engraving-particles");
      particles.style.left = "50%";
      particles.style.top = "50%";
      particles.classList.remove("active");
      void particles.offsetWidth;
      particles.classList.add("active");
    });
  });

  function checkSequence() {
    const fields = [...document.querySelectorAll(".cell input[data-answer]")];
    const status = document.getElementById("statusMessage");
    let allCorrect = true;

    fields.forEach(field => {
      const correct = field.value.trim() === field.dataset.answer;
      field.classList.toggle("correct", correct);
      field.classList.toggle("wrong", !correct);
      if (!correct) allCorrect = false;
    });

    if (!allCorrect) {
      status.textContent = "DIE WÄCHTER VERWEIGERN DEN ZUTRITT.";
      return;
    }

    fields.forEach(field => field.disabled = true);
    status.textContent = "DAS MUSTER WURDE ERKANNT. DER PFAD IST FREI.";

    document.getElementById("successFlash").classList.add("active");
    document.getElementById("nextButton").classList.add("ready");
  }

  function goNext() {
    const next = document.getElementById("nextButton");
    if (!next.classList.contains("ready")) return;

    const stage = document.getElementById("stage");
    const title = document.getElementById("transitionTitle");

    next.disabled = true;
    stage.classList.add("camera-travel");
    title.classList.add("show");

    setTimeout(() => {
      const flash = stage.animate(
        [
          { filter: "brightness(1) contrast(1)" },
          { filter: "brightness(2.1) contrast(.8)" },
          { filter: "brightness(.18) contrast(1.25)" }
        ],
        { duration: 1350, easing: "ease-in-out", fill: "forwards" }
      );

      flash.finished.then(() => {
        window.location.href = 'hidden-key.html';
      });
    }, 1250);
  }
</script>



</body>
