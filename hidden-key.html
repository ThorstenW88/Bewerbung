<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT L33T – Path of Knowledge</title>
<style>
:root{
  --gold:#d7ad58;
  --gold-soft:#b98d42;
  --stone:#18130d;
  --ember:#ff7a00;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Georgia,"Times New Roman",serif;
}

body{
  background:url("images/background.jpg") center/cover no-repeat fixed;
}

.stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

.darkness{
  position:absolute;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.14),rgba(0,0,0,.74) 78%),
    linear-gradient(rgba(0,0,0,.22),rgba(0,0,0,.38));
}

.title{
  position:absolute;
  top:34px;
  left:50%;
  z-index:5;
  transform:translateX(-50%);
  text-align:center;
  pointer-events:none;
}

.title h1{
  margin:0;
  color:var(--gold);
  font-size:clamp(34px,5vw,68px);
  font-weight:500;
  letter-spacing:.17em;
  text-shadow:0 2px 4px #000,0 0 20px rgba(215,173,88,.28);
}

.title p{
  margin:8px 0 0;
  color:var(--gold-soft);
  font-size:clamp(12px,1.3vw,18px);
  letter-spacing:.34em;
  text-transform:uppercase;
}

.title-hints{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.title-hint{
  position:relative;
  width:max-content;
  max-width:92vw;
  white-space:nowrap;
  color:var(--gold);
  font-size:clamp(14px,1.55vw,21px);
  font-style:italic;
  letter-spacing:.08em;
  text-transform:none;
  text-shadow:0 2px 4px #000,0 0 16px rgba(215,173,88,.28);
}

.title-hint .hint-char{
  position:relative;
  display:inline-block;
  opacity:0;
  transform:translateX(-12px) scale(.84);
  color:#fff4bf;
  filter:brightness(2.8);
  text-shadow:
    0 0 4px #fff8cf,
    0 0 10px #ffd36b,
    0 0 22px #ff9b00,
    0 0 38px rgba(255,92,0,.55);
}

.title-hint .hint-char.visible{
  animation:hintWrite 1.15s cubic-bezier(.18,.72,.24,1) forwards;
}

.title-hint .hint-char.space{
  width:.38em;
}

.title-hint .sparkle{
  position:absolute;
  top:50%;
  left:0;
  width:7px;
  height:7px;
  border-radius:50%;
  opacity:0;
  pointer-events:none;
  background:#fff9d5;
  box-shadow:
    0 0 4px #fff,
    0 0 10px #ffd978,
    0 0 22px #ff9b00;
  transform:translate(-50%,-50%) rotate(45deg);
}

.title-hint .sparkle::before,
.title-hint .sparkle::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  background:#fff8c7;
  transform:translate(-50%,-50%);
}
.title-hint .sparkle::before{width:1px;height:18px}
.title-hint .sparkle::after{width:18px;height:1px}

.title-hint.writing .sparkle{
  opacity:1;
  animation:sparklePulse .42s ease-in-out infinite alternate;
}

.title-hint.finished{
  animation:afterGlow 2.4s ease-out;
}

@keyframes hintWrite{
  0%{opacity:0;transform:translateX(-12px) scale(.84);filter:brightness(3.5)}
  28%{opacity:1;transform:translateX(1px) scale(1.13);color:#fff9db;filter:brightness(3)}
  58%{transform:translateX(0) scale(.98);color:#ffd77a;filter:brightness(1.8)}
  100%{opacity:1;transform:translateX(0) scale(1);color:var(--gold);filter:brightness(1);text-shadow:0 2px 4px #000,0 0 16px rgba(215,173,88,.38)}
}

@keyframes sparklePulse{
  from{transform:translate(-50%,-50%) rotate(45deg) scale(.62);filter:brightness(1.2)}
  to{transform:translate(-50%,-50%) rotate(45deg) scale(1.25);filter:brightness(2.4)}
}

@keyframes afterGlow{
  0%,22%{filter:brightness(1)}
  38%{filter:brightness(1.85);text-shadow:0 0 7px #fff4b8,0 0 18px #ffb13b,0 0 34px rgba(255,98,0,.55)}
  100%{filter:brightness(1)}
}

@media (prefers-reduced-motion:reduce){
  .title-hint .hint-char{opacity:1;transform:none;filter:none;color:var(--gold)}
  .title-hint .hint-char.visible,.title-hint.finished{animation:none}
  .title-hint .sparkle{display:none}
}

.monolith{
  position:absolute;
  left:50%;
  top:54%;
  z-index:4;
  width:min(520px,68vw);
  height:min(690px,76vh);
  transform:translate(-50%,-50%);
  background:
    linear-gradient(90deg,rgba(255,255,255,.025),transparent 12%,transparent 88%,rgba(255,255,255,.02)),
    linear-gradient(#1a1510,#0d0a07 68%,#080604);
  border:1px solid rgba(215,173,88,.18);
  clip-path:polygon(8% 0,92% 0,100% 7%,100% 100%,0 100%,0 7%);
  box-shadow:
    inset 0 0 90px rgba(0,0,0,.82),
    inset 0 0 18px rgba(215,173,88,.05),
    0 20px 80px rgba(0,0,0,.85);
}

.monolith::before{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid rgba(215,173,88,.08);
  pointer-events:none;
}

.symbol{
  position:absolute;
  top:65px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(215,173,88,.19);
  font-size:82px;
  text-shadow:0 0 22px rgba(215,173,88,.08);
  pointer-events:none;
}

.key-zone{
  position:absolute;
  left:50%;
  top:43%;
  width:88%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.key-label{
  margin:0 0 10px;
  color:var(--gold);
  font-size:clamp(18px,2vw,28px);
  font-style:italic;
  letter-spacing:.08em;
  text-shadow:0 2px 4px #000,0 0 16px rgba(215,173,88,.32);
  opacity:0;
  transform:translateY(6px);
  transition:opacity .45s ease,transform .45s ease;
}

.key-label.visible{
  opacity:1;
  transform:translateY(0);
}

.key{
  position:relative;
  display:inline-block;
  min-height:74px;
  color:transparent;
  font:clamp(32px,4.7vw,62px)/1.15 "Courier New",monospace;
  letter-spacing:.025em;
  white-space:nowrap;
  user-select:none;
}

.key .char{
  display:inline-block;
  color:transparent;
  text-shadow:none;
  transition:
    color .25s ease,
    text-shadow .35s ease,
    transform .35s ease,
    opacity .25s ease;
  opacity:.02;
}

.key .char.revealed{
  color:#ffb347;
  opacity:1;
  text-shadow:
    0 0 3px #fff4b8,
    0 0 10px #ffae00,
    0 0 22px #ff5b00,
    0 0 40px rgba(255,45,0,.65);
  animation:charBurn .7s ease-out;
}

@keyframes charBurn{
  0%{transform:scale(.7);filter:brightness(4)}
  45%{transform:scale(1.12);filter:brightness(2)}
  100%{transform:scale(1);filter:brightness(1)}
}

.seal{
  position:absolute;
  z-index:40;
  pointer-events:auto;
  left:50%;
  bottom:62px;
  width:78%;
  transform:translateX(-50%);
  padding:0;
  overflow:hidden;
  max-height:0;
  opacity:0;
  border:1px solid transparent;
  background:rgba(0,0,0,.34);
  transition:max-height .8s ease,opacity .55s ease,padding .55s ease,border-color .55s ease;
}

.seal.open{
  max-height:180px;
  opacity:1;
  padding:18px 18px 16px;
  border-color:rgba(215,173,88,.34);
}

.seal-label{
  margin:0 0 11px;
  color:#c29b53;
  font:12px/1.2 Arial,sans-serif;
  letter-spacing:.22em;
  text-transform:uppercase;
}

.seal-row{
  display:flex;
  gap:8px;
}

.seal input{
  position:relative;
  z-index:41;
  pointer-events:auto;
  flex:1;
  min-width:0;
  padding:11px 12px;
  color:#ffe1a0;
  background:#090704;
  border:1px solid rgba(215,173,88,.42);
  outline:none;
  font:16px "Courier New",monospace;
  box-shadow:inset 0 0 15px rgba(0,0,0,.8);
}

.seal input:focus{
  border-color:#f0c66b;
  box-shadow:0 0 12px rgba(255,165,0,.18),inset 0 0 15px rgba(0,0,0,.8);
}

.seal button{
  position:relative;
  z-index:41;
  pointer-events:auto;
  padding:0 16px;
  color:#e7cf96;
  background:#3c290d;
  border:1px solid #9c712e;
  cursor:pointer;
  font-weight:700;
}

.seal button:hover{background:#5b3d11}

.feedback{
  min-height:20px;
  margin:10px 0 0;
  color:#ff8f8f;
  font:13px "Courier New",monospace;
}

.hidden-selection{
  position:absolute;
  inset:0;
  z-index:12;
  color:transparent;
  user-select:text;
  cursor:text;
  overflow:hidden;
}

.hidden-line{
  display:block;
  width:100%;
  height:2.083333%;
  color:transparent;
  white-space:nowrap;
  overflow:hidden;
  font:18px/1 Arial,sans-serif;
}

.hidden-line::selection{
  color:transparent;
  background:rgba(255,115,0,.14);
}

.fire-line{
  position:absolute;
  left:-8%;
  width:116%;
  height:20px;
  z-index:20;
  opacity:0;
  pointer-events:none;
  transform:translateY(-50%);
  background:radial-gradient(ellipse at center,
    rgba(255,255,210,.98) 0 3%,
    rgba(255,195,0,.98) 10%,
    rgba(255,77,0,.82) 35%,
    rgba(255,40,0,.18) 62%,
    transparent 77%);
  filter:blur(1px) drop-shadow(0 0 10px #ff6a00) drop-shadow(0 0 24px #ff2500);
}

.fire-line.active{animation:firePulse .72s ease-out}

@keyframes firePulse{
  0%{opacity:0;transform:translateY(-50%) scaleX(.15)}
  18%{opacity:1}
  62%{opacity:1;transform:translateY(-50%) scaleX(1)}
  100%{opacity:0;transform:translateY(-50%) scaleX(1.04)}
}

.embers{
  position:absolute;
  inset:0;
  z-index:21;
  pointer-events:none;
  overflow:hidden;
}

.ember{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:#ffe09a;
  box-shadow:0 0 6px #ff9100,0 0 12px #ff2b00;
  animation:emberRise var(--duration) ease-out forwards;
}

@keyframes emberRise{
  from{opacity:1;transform:translate(0,0) scale(1)}
  to{opacity:0;transform:translate(var(--drift),-90px) scale(.12)}
}

.scan{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
}

.scan-row{
  position:absolute;
  left:0;
  width:100%;
  background:#020201;
  opacity:0;
  transition:opacity .45s ease;
}

.scan-row.covered{opacity:.96}
.scan-row.open{opacity:0}

.monolith.accepted{
  animation:monolithPulse 1.2s ease-out;
}

@keyframes monolithPulse{
  0%{filter:brightness(1)}
  20%{filter:brightness(2)}
  45%{filter:brightness(.8)}
  70%{filter:brightness(1.5)}
  100%{filter:brightness(1)}
}

.final-message{
  position:absolute;
  inset:0;
  z-index:30;
  display:grid;
  place-items:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .5s;
  background:rgba(0,0,0,.34);
}

.final-message.visible{opacity:1}

.final-card{
  width:min(560px,86vw);
  padding:26px;
  text-align:center;
  color:#f0d79b;
  background:rgba(5,3,1,.82);
  border:1px solid rgba(215,173,88,.6);
  box-shadow:0 0 45px rgba(255,80,0,.28);
}

.final-card p{
  margin:0;
  color:#b98d42;
  letter-spacing:.23em;
}

.final-card h2{
  margin:10px 0 0;
  font-weight:500;
  letter-spacing:.12em;
  font-size:clamp(28px,4vw,46px);
}

.wonder-button{
position:fixed;right:40px;bottom:30px;display:none;padding:14px 30px;
color:#e6cf97;background:rgba(20,12,6,.85);border:1px solid rgba(215,173,88,.45);
font-family:Georgia,serif;font-size:20px;letter-spacing:.08em;cursor:pointer;z-index:100;
}
.wonder-button:hover{border-color:#f0d38b;box-shadow:0 0 18px rgba(215,173,88,.35);transform:translateY(-2px);}


/* Dezentere, aber verständlichere Benutzerführung */
.discovery-hint{
  position:fixed;
  left:50%;
  bottom:22px;
  z-index:60;
  transform:translateX(-50%);
  padding:10px 16px;
  color:rgba(215,173,88,.72);
  background:rgba(5,3,1,.58);
  border:1px solid rgba(215,173,88,.18);
  font:12px/1.35 "Courier New",monospace;
  letter-spacing:.12em;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .7s ease,transform .7s ease;
  backdrop-filter:blur(2px);
}
.discovery-hint.visible{opacity:1;transform:translateX(-50%) translateY(-4px)}
.discovery-hint.hidden{opacity:0}

.hidden-selection::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(2.083333% - 1px),
    rgba(255,130,0,.028) calc(2.083333% - 1px),
    rgba(255,130,0,.028) 2.083333%
  );
  transition:opacity .5s ease;
}
.hidden-selection.hint-active::after{opacity:1}

@media (max-width:700px){
  .monolith{width:min(560px,88vw);height:min(690px,72vh)}
  .title{top:22px}
  .seal{bottom:34px;width:88%}
  .seal-row{flex-direction:column}
  .seal button{min-height:42px}
  .discovery-hint{bottom:12px;width:calc(100% - 28px)}
}


/* ===== L33T-MONSTER – Begleiter der Hidden-Key-Seite ===== */
.l33t-monster-companion{
  position:fixed;
  left:clamp(12px,2.5vw,38px);
  bottom:clamp(12px,3vh,30px);
  z-index:26;
  width:clamp(112px,12vw,178px);
  pointer-events:none;
  transform-origin:50% 100%;
  animation:monsterIdle 4.2s ease-in-out infinite;
  filter:drop-shadow(0 15px 17px rgba(0,0,0,.82));
  transition:filter .35s ease,opacity .35s ease;
}
.l33t-monster-companion::after{
  content:"";
  position:absolute;
  left:16%;
  right:16%;
  bottom:1%;
  height:7%;
  z-index:-1;
  border-radius:50%;
  background:rgba(0,0,0,.62);
  filter:blur(8px);
  animation:monsterShadow 4.2s ease-in-out infinite;
}
.l33t-monster-image{
  display:block;
  width:100%;
  height:auto;
  border:0;
  outline:0;
  background:transparent;
  transform-origin:50% 86%;
  transition:transform .25s ease,filter .35s ease;
}
.l33t-monster-companion.noticed .l33t-monster-image{
  animation:monsterNotice .72s cubic-bezier(.2,.8,.2,1);
}
.l33t-monster-companion.confused .l33t-monster-image{
  animation:monsterConfused .62s ease-in-out 2;
  filter:saturate(.72) brightness(.86);
}
.l33t-monster-companion.happy{
  animation:none;
  filter:drop-shadow(0 15px 17px rgba(0,0,0,.82)) drop-shadow(0 0 20px rgba(255,122,0,.3));
}
.l33t-monster-companion.happy .l33t-monster-image{
  animation:monsterHappy 1.05s cubic-bezier(.18,.82,.22,1) 2;
}
.l33t-monster-heart{
  position:absolute;
  left:50%;
  top:-2%;
  color:#ff7a00;
  font-size:clamp(22px,2.2vw,34px);
  opacity:0;
  transform:translateX(-50%) scale(.4);
  text-shadow:0 0 12px rgba(255,122,0,.8);
}
.l33t-monster-companion.happy .l33t-monster-heart{
  animation:monsterHeart 1.25s ease-out 2;
}
@keyframes monsterIdle{
  0%,100%{transform:translateY(0) rotate(-.45deg)}
  50%{transform:translateY(-6px) rotate(.45deg)}
}
@keyframes monsterShadow{
  0%,100%{transform:scaleX(1);opacity:.58}
  50%{transform:scaleX(.88);opacity:.4}
}
@keyframes monsterNotice{
  0%,100%{transform:translateY(0) scale(1)}
  42%{transform:translateY(-13px) scale(1.035,.965)}
  72%{transform:translateY(2px) scale(.985,1.02)}
}
@keyframes monsterConfused{
  0%,100%{transform:rotate(0)}
  35%{transform:rotate(-5deg)}
  70%{transform:rotate(5deg)}
}
@keyframes monsterHappy{
  0%,100%{transform:translateY(0) scale(1)}
  28%{transform:translateY(-24px) scale(1.045,.95)}
  52%{transform:translateY(2px) scale(.97,1.035)}
  72%{transform:translateY(-10px) scale(1.02,.98)}
}
@keyframes monsterHeart{
  0%{opacity:0;transform:translate(-50%,10px) scale(.35)}
  28%{opacity:1;transform:translate(-50%,-4px) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-42px) scale(.72)}
}

.l33t-monster-message{
  position:absolute;
  left:calc(100% - 8px);
  bottom:58%;
  width:max-content;
  max-width:min(230px,42vw);
  padding:10px 14px;
  color:#e8cf91;
  background:linear-gradient(180deg,rgba(25,18,10,.96),rgba(7,5,3,.96));
  border:1px solid rgba(215,173,88,.5);
  border-radius:10px;
  box-shadow:0 12px 26px rgba(0,0,0,.58),inset 0 0 18px rgba(215,173,88,.04);
  font:600 clamp(11px,1vw,14px)/1.35 Georgia,"Times New Roman",serif;
  letter-spacing:.045em;
  text-align:center;
  opacity:0;
  transform:translate(-8px,8px) scale(.92);
  transform-origin:0 100%;
  transition:opacity .3s ease,transform .38s cubic-bezier(.2,.8,.2,1);
  text-shadow:0 2px 4px #000;
}
.l33t-monster-message::before{
  content:"";position:absolute;left:-8px;bottom:14px;width:14px;height:14px;
  background:#0b0805;border-left:1px solid rgba(215,173,88,.5);border-bottom:1px solid rgba(215,173,88,.5);
  transform:rotate(45deg);
}
.l33t-monster-message.visible{opacity:1;transform:translate(0,0) scale(1)}
.l33t-monster-companion.waiting .l33t-monster-image{animation:monsterWaiting 1.1s ease-in-out 2}
.l33t-monster-companion.approving .l33t-monster-image{animation:monsterApprove .75s ease both}
@keyframes monsterWaiting{0%,100%{transform:rotate(0)}50%{transform:rotate(-3deg) translateY(2px)}}
@keyframes monsterApprove{0%,100%{transform:translateY(0)}45%{transform:translateY(-8px) rotate(2deg)}}

@media(max-width:700px){
  .l33t-monster-companion{
    left:8px;
    bottom:8px;
    width:clamp(88px,23vw,126px);
    opacity:.94;
  }
  .l33t-monster-message{left:68%;bottom:82%;max-width:155px;padding:8px 10px}
}
@media(prefers-reduced-motion:reduce){
  .l33t-monster-companion,
  .l33t-monster-companion::after,
  .l33t-monster-image,
  .l33t-monster-heart{animation:none!important;transition:none!important}
}


.monster-sign{position:absolute;left:72%;bottom:52%;background:linear-gradient(#4b3b24,#2c2113);border:3px solid #b88a3d;border-radius:8px;padding:8px 14px;color:#f7e2a0;font:700 18px "Courier New",monospace;opacity:0;transform:translateY(12px) rotate(-4deg);transition:.4s;box-shadow:0 8px 18px rgba(0,0,0,.45)}
.monster-sign.visible{opacity:1;transform:translateY(0) rotate(-2deg)}

</style>
</head>
<body>
<main class="stage" id="stage">
  <div class="darkness"></div>
  <div class="scan" id="scan"></div>

  <header class="title">
    <h1>PROJECT L33T</h1>
    <p>Path of Knowledge</p>
    <div class="title-hints" aria-hidden="true">
      <div class="title-hint first" data-text="Nicht alles ist sichtbar!"><i class="sparkle"></i></div>
      <div class="title-hint second" data-text="Markiere das Unbekannte."><i class="sparkle"></i></div>
    </div>
  </header>

  <section class="monolith" id="monolith">
    <div class="symbol">⌘</div>

    <div class="key-zone">
      <div class="key-label" id="keyLabel">Key:</div>
      <div class="key" id="key" aria-label="Verborgener Schlüssel"></div>
    </div>

    <div class="seal" id="seal">
      <p class="seal-label">Enter the key</p>
      <div class="seal-row">
        <input id="keyInput" type="text" autocomplete="off" spellcheck="false">
        <button id="submitKey" type="button">ENTER</button>
      </div>
      <p class="feedback" id="feedback">&nbsp;</p>
    </div>
  </section>

  <div class="hidden-selection" id="hiddenSelection"></div>
  <div class="fire-line" id="fireLine"></div>
  <div class="embers" id="embers"></div>


  <aside class="l33t-monster-companion" id="l33tMonster" aria-hidden="true">
    <span class="l33t-monster-heart">♥</span>

</main>

<script>
(() => {
  const SECRET = "192.168.2.1";
  const ROWS = 48;

  function prepareHint(element){
    const text = element.dataset.text || "";
    const sparkle = element.querySelector(".sparkle");
    for(const character of text){
      const span = document.createElement("span");
      span.className = "hint-char" + (character === " " ? " space" : "");
      span.textContent = character === " " ? "\u00a0" : character;
      element.insertBefore(span, sparkle);
    }
    return [...element.querySelectorAll(".hint-char")];
  }

  function writeHint(element, delay, step){
    const characters = prepareHint(element);
    const sparkle = element.querySelector(".sparkle");
    setTimeout(() => {
      element.classList.add("writing");
      characters.forEach((character, index) => {
        setTimeout(() => {
          character.classList.add("visible");
          const box = character.getBoundingClientRect();
          const parent = element.getBoundingClientRect();
          sparkle.style.left = `${box.right - parent.left}px`;
          sparkle.style.top = `${box.top - parent.top + box.height / 2}px`;

          if(index === characters.length - 1){
            setTimeout(() => {
              element.classList.remove("writing");
              element.classList.add("finished");
            }, 900);
          }
        }, index * step);
      });
    }, delay);
  }

  writeHint(document.querySelector(".title-hint.first"), 2000, 165);
  writeHint(document.querySelector(".title-hint.second"), 10000, 145);

  const stage = document.getElementById("stage");
  const monolith = document.getElementById("monolith");
  const key = document.getElementById("key");
  const keyLabel = document.getElementById("keyLabel");
  const seal = document.getElementById("seal");
  const keyInput = document.getElementById("keyInput");
  const submitKey = document.getElementById("submitKey");
  const feedback = document.getElementById("feedback");
  const hiddenSelection = document.getElementById("hiddenSelection");
  const fireLine = document.getElementById("fireLine");
  const embers = document.getElementById("embers");
  const scan = document.getElementById("scan");
  const finalMessage = document.getElementById("finalMessage");
  const l33tMonster = document.getElementById("l33tMonster");
  const monsterMessage = document.getElementById("monsterMessage");
  const monsterSign = document.getElementById("monsterSign");
  const monsterSignText = document.getElementById("monsterSignText");
  const discoveryHint = document.getElementById("discoveryHint");

  let revealedChars = 0;
  let keyComplete = false;
  let accepted = false;
  const selectedRows = new Set();
  const charNodes = [];
  const scanRows = [];
  let firstInteraction = false;
  let hintTimer;
  let monsterMessageTimer;
  let monsterSignTimer;
  let idleMessageShown = false;

  function monsterSpeak(text, duration=2600, mood=""){
    if(!monsterMessage || accepted) return;
    clearTimeout(monsterMessageTimer);
    monsterMessage.textContent = text;
    monsterMessage.classList.add("visible");
    if(mood){
      l33tMonster.classList.remove("waiting","approving");
      void l33tMonster.offsetWidth;
      l33tMonster.classList.add(mood);
    }
    monsterMessageTimer = setTimeout(() => {
      monsterMessage.classList.remove("visible");
      l33tMonster.classList.remove("waiting","approving");
    }, duration);
  }

  function monsterReact(state, duration=900){
    if(!l33tMonster) return;
    l33tMonster.classList.remove("noticed","confused","happy");
    void l33tMonster.offsetWidth;
    l33tMonster.classList.add(state);
    if(state !== "happy") setTimeout(() => l33tMonster.classList.remove(state), duration);
  }

  function markedPercent(){
    return Math.min(100, Math.round((selectedRows.size / SECRET.length) * 100));
  }

  function hideMonsterSign(){
    clearTimeout(monsterSignTimer);
    if(monsterSign) monsterSign.classList.remove("visible");
  }

  function showMonsterSign(delay=0){
    clearTimeout(monsterSignTimer);

    if(!monsterSign || !monsterSignText || accepted || keyComplete) return;

    monsterSignTimer = setTimeout(() => {
      if(accepted || keyComplete) return;
      monsterSignText.textContent = `🖱️══════► ${markedPercent()}%`;
      monsterSign.classList.add("visible");
    }, delay);
  }

  function refreshMonsterSign(){
    if(!monsterSignText) return;

    const percent = markedPercent();
    monsterSignText.textContent = `🖱️══════► ${percent}%`;

    if(percent >= 100 || keyComplete || accepted){
      hideMonsterSign();
      return;
    }

    hideMonsterSign();
    showMonsterSign(1400);
  }

  [...SECRET].forEach(char => {
    const span = document.createElement("span");
    span.className = "char";
    span.textContent = char;
    key.appendChild(span);
    charNodes.push(span);
  });

  for(let i=0;i<ROWS;i++){
    const line = document.createElement("span");
    line.className = "hidden-line";
    line.textContent = ("ARCANUM · VIA · L33T · SCIENTIA · ").repeat(24);
    hiddenSelection.appendChild(line);

    const row = document.createElement("div");
    row.className = "scan-row covered";
    row.style.top = `${i / ROWS * 100}%`;
    row.style.height = `${100 / ROWS + .12}%`;
    scan.appendChild(row);
    scanRows.push(row);
  }

  function showDiscoveryHint(delay=0){
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
      if(keyComplete || accepted) return;
      if(discoveryHint) discoveryHint.classList.add("visible");
      hiddenSelection.classList.add("hint-active");
    }, delay);
  }

  function hideDiscoveryHint(){
    if(discoveryHint) discoveryHint.classList.remove("visible");
    if(discoveryHint) discoveryHint.classList.add("hidden");
    hiddenSelection.classList.remove("hint-active");
  }

  function registerExploration(){
    if(firstInteraction) return;
    firstInteraction = true;
    showDiscoveryHint(5500);
  }

  setTimeout(() => {
    if(!firstInteraction && !keyComplete && !accepted && !idleMessageShown){
      idleMessageShown = true;
      monsterSpeak("Immer noch hier?", 2800, "waiting");
    }
  }, 20000);

  function emitEmbers(x,y,amount=22){
    const rect = stage.getBoundingClientRect();

    for(let i=0;i<amount;i++){
      const ember = document.createElement("i");
      ember.className = "ember";
      ember.style.left = `${x - rect.left + (Math.random()-.5)*180}px`;
      ember.style.top = `${y - rect.top + (Math.random()-.5)*18}px`;
      ember.style.setProperty("--drift", `${(Math.random()-.5)*110}px`);
      ember.style.setProperty("--duration", `${.65 + Math.random()*.8}s`);
      embers.appendChild(ember);
      setTimeout(() => ember.remove(), 1600);
    }
  }

  function fire(y,x,strong=false){
    const rect = stage.getBoundingClientRect();
    fireLine.style.top = `${y - rect.top}px`;
    fireLine.classList.remove("active");
    void fireLine.offsetWidth;
    fireLine.classList.add("active");
    emitEmbers(x,y,strong ? 45 : 22);
  }

  function revealNextCharacter(count=1){
    if(revealedChars === 0 && count > 0){
      keyLabel.classList.add("visible");
      monsterReact("noticed");
      monsterSpeak("Interessant …", 2200, "approving");
    }

    for(let i=0;i<count && revealedChars<charNodes.length;i++){
      charNodes[revealedChars].classList.add("revealed");
      revealedChars++;
    }

    const keyRect = key.getBoundingClientRect();
    fire(keyRect.top + keyRect.height/2, keyRect.left + keyRect.width/2);

    if(revealedChars === 2) monsterSpeak("Es funktioniert.", 2200, "approving");
    else if(revealedChars >= 5 && revealedChars < charNodes.length) monsterSpeak("Du bist auf dem richtigen Weg.", 2300, "approving");

    if(revealedChars >= charNodes.length && !keyComplete){
      keyComplete = true;
      hideDiscoveryHint();
      hideMonsterSign();
      monsterSpeak("Jetzt weißt du genauso viel wie ich.", 3000, "approving");
      setTimeout(() => {
        seal.classList.add("open");
        hiddenSelection.style.pointerEvents = "none";
        setTimeout(() => keyInput.focus(), 550);
      }, 550);
    }
  }

  function onSelection(){
    if(accepted || keyComplete) return;
    registerExploration();

    const selection = getSelection();
    if(!selection || selection.rangeCount === 0 || selection.isCollapsed) return;

    const range = selection.getRangeAt(0);

    if(!hiddenSelection.contains(range.commonAncestorContainer) &&
       !hiddenSelection.contains(range.startContainer) &&
       !hiddenSelection.contains(range.endContainer)) return;

    const stageRect = stage.getBoundingClientRect();
    const rects = [...range.getClientRects()].filter(rect => rect.width > 0 && rect.height > 0);

    if(!rects.length) return;

    hideDiscoveryHint();

    for(const rect of rects){
      const firstRow = Math.max(
        0,
        Math.floor(((rect.top - stageRect.top) / stageRect.height) * ROWS)
      );
      const lastRow = Math.min(
        ROWS - 1,
        Math.floor(((rect.bottom - stageRect.top) / stageRect.height) * ROWS)
      );

      for(let row = firstRow; row <= lastRow; row++){
        selectedRows.add(row);
      }
    }

    /*
      Die IP wird anhand ihrer tatsächlichen Zeichenanzahl vollständig enthüllt. Je mehr unterschiedliche horizontale
      Bildschirmzeilen markiert wurden, desto mehr Zeichen erscheinen.
      Nach genügend markierten Zeilen ist sie garantiert vollständig sichtbar.
    */
    const targetChars = Math.min(SECRET.length, selectedRows.size);

    if(targetChars > revealedChars){
      revealNextCharacter(targetChars - revealedChars);
    }

    refreshMonsterSign();
  }

  function validate(){
    if(keyInput.value.trim() !== SECRET){
      feedback.textContent = "INVALID KEY";
      monsterReact("confused", 1300);
      monsterSpeak("Fast.", 1900);
      keyInput.select();
      return;
    }

    accepted = true;
    hideMonsterSign();
    feedback.style.color = "#8dff96";
    feedback.textContent = "KEY ACCEPTED";
    keyInput.disabled = true;
    submitKey.disabled = true;
    monolith.classList.add("accepted");
    monsterReact("happy");
    clearTimeout(monsterMessageTimer);
    if(monsterMessage){
      monsterMessage.textContent = "Ich wusste, dass du es schaffst.";
      monsterMessage.classList.add("visible");
      setTimeout(() => monsterMessage.classList.remove("visible"), 3600);
    }

    setTimeout(() => {
      seal.classList.remove("open");

      let i = 0;
      const interval = setInterval(() => {
        if(i >= scanRows.length){
          clearInterval(interval);
          finalMessage.classList.add("visible");
          return;
        }

        scanRows[i].classList.remove("covered");
        scanRows[i].classList.add("open");

        const rect = stage.getBoundingClientRect();
        fire(rect.top + (i / ROWS) * rect.height, rect.left + rect.width / 2, i % 8 === 0);
        i++;
      }, 48);
    }, 700);
  }

  submitKey.addEventListener("click", validate);
  keyInput.addEventListener("keydown", event => {
    if(event.key === "Enter") validate();
  });

  document.addEventListener("selectionchange", onSelection);
  document.addEventListener("mouseup", onSelection);
  document.addEventListener("touchend", onSelection, {passive:true});

  stage.addEventListener("pointerdown", registerExploration, {passive:true});
  stage.addEventListener("mousemove", registerExploration, {passive:true});

  /* Falls der Nutzer gar nichts ausprobiert, erscheint erst spät ein kryptischer Hinweis. */
  showDiscoveryHint(12000);
})();
</script>
